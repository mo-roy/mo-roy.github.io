<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="fr-FR">
<head>
    <meta charset="utf-8" />
    <title>Portfolio</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }
        .container-fluid {
            padding: 0;
        }
        .portfolio-section {
            width: 100%;
            padding: 0;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #000;
            margin-bottom: 20px; 
            page-break-after: always;
        }
        .portfolio-image {
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
        }
        .portfolio-video, .portfolio-motion {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: auto; 
            max-width: 70%; 
            max-height: 70%;
        }
        /* Media query for mobile devices */
        @media (max-width: 767.98px) {
            .portfolio-section {
                margin-bottom: 10px;
                height: auto;
                border-bottom: 0; 
                flex-direction: column;
                padding: 10px;
            }
            .portfolio-image {
                max-width: 100%; 
                max-height: auto;
            }
            
        }
    </style>
</head>
